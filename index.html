<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel Scrolling Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <header>
        <h2 class="logo">Logo</h2>
        <nav class="navigation">
            <a href="#" class="active">Home</a>
            <a href="#">About</a>
            <a href="#">Service</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="parallax">

        <h2 id="text">Marvel</h2>
        <img src="Images/city.jpg" id="picture-1">
        <img src="Images/cloud1.png" id="picture-2">
        <img src="Images/cloud2.png" id="picture-3">
        <img src="Images/ironman07.png" id="ironman07">
        <img src="Images/jet.png" id="picture-11">
        <img src="Images/moon.png" id="picture-12">

    <section class="sec" id="about">
        <h2>About Marvel</h2>
        <p>
            Marvel Studios has brought iconic heroes to life through groundbreaking
            visual effects and storytelling. This parallax demo layers background,
            clouds, moon, and characters at different scroll speeds.
        </p>
    </section>

    <script src="script.js"></script>
